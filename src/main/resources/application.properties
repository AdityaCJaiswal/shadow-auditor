# ?????????????????????????????????????????????
#  Shadow Auditor ? Application Configuration
# ?????????????????????????????????????????????

# Google AI / Gemini
# Set via env var: GOOGLE_API_KEY or GEMINI_API_KEY
# Or override here (NOT recommended for production)
gemini.model=gemini-2.5-flash
gemini.temperature=0.2
gemini.max-output-tokens=8192

# Agent identifiers
agent.cfo.name=CFO_RootAgent
agent.auditor.name=AuditorAgent
agent.negotiator.name=NegotiatorAgent

# Session
session.app-name=ShadowAuditorApp

# Finance thresholds (used by FinanceTools)
finance.spike-threshold-percent=30.0
finance.large-transaction-threshold=10000.0
finance.duplicate-window-hours=24

# PII Shield patterns (comma-separated regex group names)
pii.mask-fields=credit_card,bank_account,ssn,tax_id,iban

# Sample PDF path (override with --pdf-path CLI arg)
finance.sample-pdf=src/main/resources/sample_expenses.pdf